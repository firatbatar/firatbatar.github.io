{{ define "meta_tags" }}

<meta name="description" content="Fırat Batar's Blog">
<meta name="keywords" content="Fırat Batar, blog">
<meta property="og:title" content="Blog">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="firatbatar" />
<meta property="og:description" content="Fırat Batar's blog.">

{{ end }}

{{ define "main" }}

<div class="container">
    <div class="post-header">
        <span class="eyebrow mb-2">Writing</span>
        <h1>{{ .Title }}</h1>
        <p style="color: var(--text-muted); max-width: 540px; margin: 1rem auto 0;">Notes, tutorials, and the occasional rabbit hole.</p>
    </div>

    <div class="blog-grid mb-5 pb-5">
        {{ range .Pages }}
            {{ partial "components/blogPostCard.html" . }}
        {{ end }}
    </div>
</div>

{{ end }}
