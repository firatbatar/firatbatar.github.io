<footer class="d-flex flex-column justify-content-center align-items-center">
    <div class="contact-links mb-3">
        <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <i class="fa-brands fa-github"></i>
        </a>
        <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin"></i>
        </a>
    </div>

    <div class="made-with-hugo mb-2">
        <a href="https://gohugo.io/" target="_blank" rel="noopener noreferrer">
            {{ $hugo_icon := resources.Get "images/hugo-icon.png" }}
            <img src="{{ $hugo_icon.RelPermalink }}" alt="Hugo Logo">
            <span>Made with Hugo</span>
        </a>
    </div>

    <div class="copy-rights">
        <p>&copy; {{ now.Format "2006" }} Fırat Batar</p>
    </div>
</footer>
