<section id="latest-post">
    <div class="container">
        <div class="section-heading">
            <div>
                <span class="eyebrow">Writing</span>
                <h2>Latest post</h2>
            </div>
            <div class="section-divider"></div>
            <a href="{{ .RelPermalink }}" class="btn btn-ghost d-none d-md-inline-flex">
                All posts <i class="fa-solid fa-arrow-right ms-1"></i>
            </a>
        </div>

        {{ range first 1 .Pages }}
        <article class="about-content">
            <h2 class="mb-2">{{ .Title }}</h2>

            <div class="d-flex align-items-center flex-wrap gap-2 mb-3" style="color: var(--text-muted); font-size: 0.9rem;">
                {{ partial "util/getDateTime.html" . }}
                {{ range .Params.tags }}
                <span class="badge rounded-pill bg-secondary">{{ . }}</span>
                {{ end }}
            </div>

            <div class="mb-4" style="color: var(--text-muted);">
                {{ .Summary | markdownify }}
            </div>

            <div class="d-flex justify-content-end">
                <a href="{{ .RelPermalink }}" class="btn btn-primary">
                    Read post <i class="fa-solid fa-arrow-right ms-1"></i>
                </a>
            </div>
        </article>
        {{ end }}

        <div class="text-center mt-4 d-md-none">
            <a href="{{ .RelPermalink }}" class="btn btn-ghost">
                All posts <i class="fa-solid fa-arrow-right ms-1"></i>
            </a>
        </div>
    </div>
</section>
